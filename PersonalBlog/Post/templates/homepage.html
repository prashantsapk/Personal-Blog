{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark" >
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Blog</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="http://127.0.0.1:8000/post/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">My Post's</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">My Profile</a>
      </ul>
      
    </div>

    <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success me-md-2" type="submit">Search</button>
      </form>
      
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
  <a href="http://127.0.0.1:8000/post/signup/"><button class="btn btn-primary me-md-2" type="button">Signup</button></a>
 <a href="http://127.0.0.1:8000/post/login/"><button class="btn btn-primary" type="button">Login</button></a>
</div>
  </div>
</nav>
  
  
  {% block content %}

   <br><a href="http://127.0.0.1:8000/post/createpost/"><button class="btn btn-primary" type="submit">Create Post</button></a><br>
   

        

  <div class="container">
  <div class="row g-4">

    {% for i in Postathomepageobj %}

    <div class="col-md-4">
      <div class="card h-100">

        <img src="{{ i.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ i.title }}</h5>
          <p class="card-text">{{ i.description }}</p>

          
           <div class="d-flex gap-2">
          <form method="post" action={% url 'deletepost'%}>
            {% csrf_token %}
          <input type="hidden" value={{i.id}} name='id'>
          <button class="btn btn-primary me-md-2" type="sumbit">Delete</button>
          </form>

          <form action="{% url 'updatepost' i.id %}" method="get">
            {% csrf_token %}
          <button class="btn btn-primary me-md-2" type="sumbit">Edit</button>
          </form>

          <form action="{% url 'comment' i.id %}" method="get">
            {% csrf_token %}
          <button class="btn btn-primary me-md-2" type="sumbit">Comment</button>
          </form>

          </div>
          
          <br> Post id : #{{i.id}}<br>
          Username : {{i.user.username}}
        </div>

      </div>
    </div>

    {% endfor %}

    {% endblock content %}

  </div>
</div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
